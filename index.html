<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSHD Mobil</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
overflow:hidden;
background:#050505;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

/* HAREKETLİ ARKA PLAN */

.bg{
position:fixed;
inset:0;
background:
linear-gradient(130deg,#050505,#2b0000,#2a2200,#050505);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
z-index:-5;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

.orb{
position:fixed;
border-radius:50%;
filter:blur(50px);
opacity:.5;
z-index:-4;
}

.o1{
width:240px;
height:240px;
background:red;
top:0;
left:0;
animation:float 7s infinite alternate;
}

.o2{
width:260px;
height:260px;
background:#ffcc00;
bottom:0;
right:0;
animation:float 8s infinite alternate-reverse;
}

@keyframes float{
to{
transform:translateY(50px) scale(1.1);
}
}

/* KART */

.card{
width:100%;
max-width:430px;
background:rgba(0,0,0,.65);
border:1px solid rgba(255,204,0,.4);
border-radius:30px;
padding:30px 22px;
text-align:center;
backdrop-filter:blur(15px);
box-shadow:
0 0 30px #ff000055,
0 0 60px #ffcc0033;
}

.logo{
width:125px;
height:125px;
border-radius:50%;
object-fit:cover;
border:4px solid #ffcc00;
box-shadow:
0 0 25px red,
0 0 50px #ffcc00;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.04);
}
}

h1{
margin-top:18px;
font-size:34px;
color:#ffcc00;
text-shadow:
0 0 10px red,
0 0 25px #ffcc00;
}

.sub{
margin-top:10px;
font-size:15px;
color:#ddd;
}

/* POSTER */

.poster{
width:100%;
border-radius:20px;
margin-top:22px;
border:2px solid #ffcc00;
box-shadow:
0 0 20px red,
0 0 35px #ffcc00;
}

/* BUTONLAR */

.link{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
width:100%;
padding:17px;
margin-top:18px;
border-radius:18px;
font-weight:bold;
font-size:17px;
color:white;
text-decoration:none;
position:relative;
overflow:hidden;
transition:.25s;
}

.link:hover{
transform:scale(1.05);
}

.link:before{
content:"";
position:absolute;
top:0;
left:-100%;
width:70%;
height:100%;
background:
linear-gradient(90deg,
transparent,
rgba(255,255,255,.45),
transparent);
animation:shine 3s infinite;
}

@keyframes shine{
100%{
left:140%;
}
}

.apk{
background:linear-gradient(135deg,#ffcc00,#ff0000);
box-shadow:0 0 20px #ff000077;
}

.telegram{
background:linear-gradient(135deg,#0099ff,#004f80);
}

.note{
margin-top:22px;
font-size:13px;
color:#bbb;
}

/* DOWNLOAD POPUP */

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.popup-box{
width:100%;
max-width:360px;
background:#111;
border:1px solid #ffcc00;
border-radius:25px;
padding:30px 25px;
text-align:center;
box-shadow:
0 0 30px red,
0 0 60px #ffcc00;
}

.loader{
width:90px;
height:90px;
border-radius:50%;
border:7px solid rgba(255,255,255,.15);
border-top:7px solid #ffcc00;
margin:0 auto 20px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.downloadText{
font-size:22px;
font-weight:bold;
color:#ffcc00;
}

.counter{
margin-top:15px;
font-size:55px;
font-weight:bold;
color:white;
text-shadow:0 0 15px red;
}

.info{
margin-top:10px;
font-size:14px;
color:#ccc;
}

.thanks{
margin-top:20px;
font-size:15px;
color:#ffcc00;
display:none;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:none;
}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="orb o1"></div>
<div class="orb o2"></div>

<div class="card">

<img class="logo"
src="https://i.hizliresim.com/8xzjgqv.jpg">

<h1>GSHD MOBİL</h1>

<div class="sub">
Galatasaraylıların Premium Uygulaması
</div>

<img class="poster"
src="https://resmim.net/cdn/2026/05/08/CyZCE3.jpg">

<a class="link apk"
href="#"
onclick="startDownload()">
📲 Uygulamayı İndir
</a>

<a class="link telegram"
href="TELEGRAM_LINKINI_BURAYA_YAZ">
💬 Telegram Grubuna Katıl
</a>

<div class="note">
Android • TV Box • Tablet Uyumlu
</div>

</div>

<!-- DOWNLOAD POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<div class="loader"></div>

<div class="downloadText">
İndiriliyor...
</div>

<div class="counter" id="counter">
5
</div>

<div class="info">
APK hazırlanıyor...
</div>

<div class="thanks" id="thanks">
❤️ Desteğiniz için teşekkürler
</div>

</div>

</div>

<script>

function startDownload(){

document.getElementById("popup").style.display="flex";

let count=5;

let counter=document.getElementById("counter");

let interval=setInterval(()=>{

count--;

counter.innerText=count;

if(count<=0){

clearInterval(interval);

document.getElementById("thanks").style.display="block";

setTimeout(()=>{

window.location.href=
"https://github.com/GSHDapkindir/GSHDapkindir/releases/download/v9/GS.HD_v9.apk";

},2000);

}

},1000);

}

</script>

</body>
</html>
